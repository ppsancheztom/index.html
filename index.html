<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una sorpresa para ti</title>
    <style>
        /* Estilos generales y fondo degradado interactivo */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Fondo degradado azul claro a verde claro solicitado */
            background: linear-gradient(135deg, #bbf2f6 0%, #86e3ce 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #2c3e50;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 480px;
            width: 90%;
            box-sizing: border-box;
            z-index: 2;
        }

        /* Botón Comenzar con animación de pulso */
        .btn-comenzar {
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-comenzar:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.6);
        }

        /* Tarjeta de la carta (cristal translúcido muy elegante) */
        .content-card {
            display: none;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px 25px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeIn 1.2s ease forwards;
            max-height: 75vh;
            overflow-y: auto;
        }

        /* Formato del texto de la propuesta */
        .texto-propuesta {
            font-size: 1.1rem;
            line-height: 1.7;
            text-align: left;
            color: #34495e;
            white-space: pre-line;
            margin-bottom: 20px;
        }

        /* Botones de respuesta finales */
        .botones-respuesta {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
            min-height: 55px;
        }

        .btn-si {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            transition: transform 0.2s ease;
        }

        .btn-si:hover {
            transform: scale(1.1);
        }

        .btn-no {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            transition: all 0.1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Corazones flotantes de fondo */
        .heart {
            position: absolute;
            font-size: 20px;
            color: rgba(255, 105, 180, 0.5);
            animation: float 5s linear infinite;
            z-index: 1;
            bottom: -50px;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="musica-propuesta" loop>
        <source src="https://www.dropbox.com/scl/fi/ai3jwf87rj84n5moiklrj/Canci-n-Peque-a-Abel-Velazquez.mp3?rlkey=lag97m0tvx6y4iy0gj31xlugt&st=gsq8ryct&dl=1" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="pantalla-inicio">
            <button class="btn-comenzar" onclick="iniciarSorpresa()">Comenzar ❤️</button>
        </div>

        <div id="pantalla-propuesta" class="content-card">
            <div class="texto-propuesta" id="texto-animado"></div>
            
            <div class="botones-respuesta" id="bloque-botones" style="visibility: hidden;">
                <button class="btn-si" onclick="aceptarPropuesta()">¡Sí! 💍</button>
                <button class="btn-no" id="btn-no" onmouseover="huirBotonNo()" onclick="huirBotonNo()">No</button>
            </div>
        </div>
    </div>

    <script>
        // Tu texto pulido y estructurado con saltos de línea para la animación
        const textoCarta = `Quiero que sepas que, desde que comenzamos esta aventura, no he pasado más que grandes momentos platicando contigo. Han sido largas horas y muchas desveladas, pero créeme: todas las disfruto. Me encanta que me cuentes tus días buenos y malos, así como las cosas que nos pasan por esta suerte tan peculiar que tenemos. Adoro la forma en cómo hemos conectado y el cariño e interés que ambos ponemos para que todo esto siga creciendo.\\n\\nQuiero que este sea el primer paso y que en mis días siempre estés tú; caminar de tu mano, poderte abrazar y robarte un beso cada que la distancia lo permita. Como te dije, sé que una relación así no es fácil, pero tampoco imposible. Viendo la hermosa conexión que hemos construido a distancia, me doy cuenta de que eres la persona que quiero en mi vida. Por eso quiero hacer las cosas bien contigo y, aunque para muchos suene como una simple etiqueta, quiero que lo nuestro sea algo formal.\\n\\nPor eso te quiero preguntar, mi pollito... ¿te gustaría intentarlo sin miedo y con todas las ganas de que funcione?\\n\\n¿Quieres ser mi novia?`;

        function iniciarSorpresa() {
            // Oculta el botón inicial
            document.getElementById('pantalla-inicio').style.display = 'none';
            
            // Muestra la tarjeta del mensaje
            const tarjeta = document.getElementById('pantalla-propuesta');
            tarjeta.style.display = 'block';
            
            // Activa la reproducción de la canción de Abel Velázquez
            const audio = document.getElementById('musica-propuesta');
            audio.play().catch(err => console.log("Permiso de audio retenido por el navegador: ", err));
            
            // Efecto de texto letra por letra
            let indice = 0;
            const contenedorTexto = document.getElementById('texto-animado');
            
            function escribir() {
                if (indice < textoCarta.length) {
                    if (textoCarta.substring(indice, indice + 2) === '\\n') {
                        contenedorTexto.innerHTML += '<br>';
                        indice += 2;
                    } else {
                        contenedorTexto.innerHTML += textoCarta.charAt(indice);
                        indice++;
                    }
                    // Auto-scroll para que el texto acompañe la lectura en pantallas móviles
                    tarjeta.scrollTop = tarjeta.scrollHeight;
                    setTimeout(escribir, 120); // Velocidad de escritura (50ms por carácter)
                } else {
                    // Revelar los botones cuando acabe por completo el texto
                    document.getElementById('bloque-botones').style.visibility = 'visible';
                }
            }
            
            escribir();
            // Lluvia constante de corazones flotantes en el fondo
            setInterval(crearCorazonEfecto, 400);
        }

        // Truco interactivo: el botón "No" esquiva el cursor o los toques en la pantalla
        function huirBotonNo() {
            const btnNo = document.getElementById('btn-no');
            // Genera coordenadas aleatorias dentro de la ventana del dispositivo
            const nuevoX = Math.random() * (window.innerWidth - btnNo.offsetWidth - 30);
            const nuevoY = Math.random() * (window.innerHeight - btnNo.offsetHeight - 30);
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = nuevoX + 'px';
            btnNo.style.top = nuevoY + 'px';
        }

        // Mensaje emergente al presionar SÍ
        function aceptarPropuesta() {
            alert('¡Sabía que dirías que sí! ❤️ Eres lo mejor de mi vida.');
            // Opcional: puedes poner un enlace a tu WhatsApp aquí si descomentas la línea de abajo:
            // window.location.href = "https://wa.me/tu_numero_de_telefono";
        }

        // Generador de mini corazones decorativos flotantes
        function crearCorazonEfecto() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.fontSize = (Math.random() * 15 + 12) + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
